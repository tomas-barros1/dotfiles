### Apps
bindsym $mod+Return exec $term
bindsym $mod+space exec nc -U /run/user/1000/walker/walker.sock
bindsym $mod+b exec $browser
bindsym $mod+z exec $zeditor
bindsym $mod+e exec $filemanager
bindsym $mod+i exec $homedir/.local/share/JetBrains/Toolbox/apps/intellij-idea/bin/idea
bindsym $mod+h exec $zeditor $homedir/dotfiles/sway/.config/sway/
bindsym $mod+d exec $homedir/.local/bin/powermenu.sh
bindsym $mod+v exec walker -m clipboard
bindsym $mod+period exec walker -m symbols
bindsym $mod+Shift+w exec wallpaper-select.sh
bindsym $mod+t exec sh -c 'grim -g "$(slurp)" - | tesseract stdin stdout -l por | wl-copy'
bindsym $mod+s exec steam

### Fechar / Float / Split
bindsym $mod+w kill
bindsym $mod+g floating toggle
bindsym $mod+j layout toggle split

### Fullscreen
bindsym $mod+f fullscreen
bindsym $mod+F11 fullscreen

### Recarregar configuração
bindsym $mod+Shift+r exec sh -c 'swaymsg reload && notify-send "Sway" "Config recarregada com sucesso"'

### Sair
bindsym $mod+m exec swaynag -t warning -m 'Deseja sair do Sway?' -B 'Sim, sair' 'swaymsg exit'

### Foco
bindsym $mod+Left focus left
bindsym $mod+Down focus down
bindsym $mod+Up focus up
bindsym $mod+Right focus right

### Mover janela
bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Right move right

### Workspaces
bindsym $mod+1 workspace number 1
bindsym $mod+2 workspace number 2
bindsym $mod+3 workspace number 3
bindsym $mod+4 workspace number 4
bindsym $mod+5 workspace number 5
bindsym $mod+6 workspace number 6
bindsym $mod+7 workspace number 7
bindsym $mod+8 workspace number 8
bindsym $mod+9 workspace number 9

bindsym $mod+Shift+1 move container to workspace number 1, workspace number 1
bindsym $mod+Shift+2 move container to workspace number 2, workspace number 2
bindsym $mod+Shift+3 move container to workspace number 3, workspace number 3
bindsym $mod+Shift+4 move container to workspace number 4, workspace number 4
bindsym $mod+Shift+5 move container to workspace number 5, workspace number 5
bindsym $mod+Shift+6 move container to workspace number 6, workspace number 6
bindsym $mod+Shift+7 move container to workspace number 7, workspace number 7
bindsym $mod+Shift+8 move container to workspace number 8, workspace number 8
bindsym $mod+Shift+9 move container to workspace number 9, workspace number 9

### Redimensionar
bindsym $mod+equal resize grow width 20px, resize grow height 20px
bindsym $mod+minus resize shrink width 20px, resize shrink height 20px
bindsym $mod+0 resize set width 900 px, resize set height 600 px

### Áudio
bindsym --locked XF86AudioRaiseVolume exec pactl set-sink-volume @DEFAULT_SINK@ +5%
bindsym --locked XF86AudioLowerVolume exec pactl set-sink-volume @DEFAULT_SINK@ -5%
bindsym --locked XF86AudioMute exec pactl set-sink-mute @DEFAULT_SINK@ toggle
bindsym --locked XF86AudioMicMute exec pactl set-source-mute @DEFAULT_SOURCE@ toggle

### Media
bindsym --locked XF86AudioNext exec playerctl next
bindsym --locked XF86AudioPause exec playerctl play-pause
bindsym --locked XF86AudioPlay exec playerctl play-pause
bindsym --locked XF86AudioPrev exec playerctl previous
bindsym --locked XF86AudioStop exec playerctl stop

### Brilho
bindsym --locked XF86MonBrightnessDown exec brightnessctl set 5%-
bindsym --locked XF86MonBrightnessUp exec brightnessctl set 5%+

### Screenshots (flameshot)
bindsym --locked Print exec flameshot gui -p ~/Pictures/Screenshots -c
bindsym --locked $mod+Shift+Print exec flameshot full -p ~/Pictures/Screenshots -c

### Resize Mode
mode "resize" {
    bindsym h resize shrink width 10px
    bindsym j resize grow height 10px
    bindsym k resize shrink height 10px
    bindsym l resize grow width 10px

    bindsym Left resize shrink width 10px
    bindsym Down resize grow height 10px
    bindsym Up resize shrink height 10px
    bindsym Right resize grow width 10px

    bindsym Return mode "default"
    bindsym Escape mode "default"
}
bindsym $mod+r mode "resize"
